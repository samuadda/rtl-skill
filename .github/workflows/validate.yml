name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # No `npm install` — the validator has zero runtime dependencies
      # and we don't want CI to need ANTHROPIC_API_KEY or pull the SDK.
      - name: Run structure validator
        run: node test/validate.mjs
