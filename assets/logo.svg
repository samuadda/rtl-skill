<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160" role="img" aria-label="rtl-skill">
  <style>
    .text-main { fill: #0f172a; }
    .text-sub { fill: #64748b; }
    .box-bg { fill: #ffffff; stroke: #e2e8f0; }
    .mark-swoosh { stroke: #0f172a; }
    .mark-arrow { stroke: #3b82f6; }
    @media (prefers-color-scheme: dark) {
      .text-main { fill: #f8fafc; }
      .text-sub { fill: #94a3b8; }
      .box-bg { fill: #020617; stroke: #1e293b; }
      .mark-swoosh { stroke: #f8fafc; }
      .mark-arrow { stroke: #60a5fa; }
    }
  </style>

  <g transform="translate(20, 20)">
    <!-- Sleek Box -->
    <rect class="box-bg" x="0" y="0" width="120" height="120" rx="28" stroke-width="2" />
    
    <!-- Abstract 'ر' -->
    <path d="M 82 35 Q 82 85 35 88" fill="none" class="mark-swoosh" stroke-width="12" stroke-linecap="round" />
    
    <!-- Directional arrow -->
    <path d="M 50 73 L 35 88 L 50 103" fill="none" class="mark-arrow" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Elite Typography -->
  <g transform="translate(170, 0)">
    <text class="text-main" x="0" y="85" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="54" font-weight="800" letter-spacing="-2.5">
      rtl<tspan font-weight="300" class="text-sub">-skill</tspan>
    </text>
    
    <text class="text-sub" x="4" y="115" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="13" font-weight="600" letter-spacing="4" text-transform="uppercase">
      RTL Architecture Standard
    </text>
  </g>
</svg>
