<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="rtl-skill mark">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#00d9b3"/>
    </linearGradient>
  </defs>

  <!-- Mark body -->
  <rect width="120" height="120" rx="24" fill="#0a0a0f"/>
  <rect width="120" height="120" rx="24" fill="none" stroke="url(#brand)" stroke-width="1.5" opacity="0.6"/>

  <!-- Stylized ر -->
  <path
    d="M 86 34 Q 86 78 38 84"
    stroke="url(#brand)"
    stroke-width="11"
    stroke-linecap="round"
    fill="none"/>

  <!-- Direction-flow dots -->
  <circle cx="86" cy="100" r="3.5" fill="#00d9b3" opacity="0.95"/>
  <circle cx="72" cy="100" r="2.8" fill="#00d9b3" opacity="0.6"/>
  <circle cx="60" cy="100" r="2.2" fill="#00d9b3" opacity="0.3"/>
</svg>
