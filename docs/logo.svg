<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="rtl-skill mark">
  <style>
    .box-bg { fill: #ffffff; stroke: #e2e8f0; }
    .mark-swoosh { stroke: #0f172a; }
    .mark-arrow { stroke: #3b82f6; }
    @media (prefers-color-scheme: dark) {
      .box-bg { fill: #0f172a; stroke: #1e293b; }
      .mark-swoosh { stroke: #f8fafc; }
      .mark-arrow { stroke: #60a5fa; }
    }
  </style>

  <rect class="box-bg" x="0" y="0" width="120" height="120" rx="26" stroke-width="2"/>

  <!-- Stylized ر -->
  <path d="M 88 28 Q 88 82 34 88" fill="none" class="mark-swoosh" stroke-width="12" stroke-linecap="round"/>

  <!-- Directional arrow -->
  <path d="M 50 72 L 34 88 L 50 104" fill="none" class="mark-arrow" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
