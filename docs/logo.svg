<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" width="520" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a1f"/>
      <stop offset="100%" stop-color="#0d1a33"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="180" rx="20" fill="url(#bg)"/>

  <!-- Subtle RTL-direction dots (right → left hint) -->
  <circle cx="468" cy="32" r="5" fill="#fbbf24" opacity="0.7"/>
  <circle cx="450" cy="32" r="4" fill="#fbbf24" opacity="0.45"/>
  <circle cx="435" cy="32" r="3" fill="#fbbf24" opacity="0.22"/>

  <!-- Arabic "رطل" — the phonetic RTL in Arabic letters, rendered RTL -->
  <text
    x="260"
    y="102"
    font-family="'Amiri', 'Arabic Typesetting', 'Scheherazade New', 'Traditional Arabic', Georgia, serif"
    font-size="82"
    font-weight="700"
    fill="url(#gold)"
    text-anchor="middle"
    dominant-baseline="middle"
    direction="rtl"
    unicode-bidi="bidi-override">رطل</text>

  <!-- Divider -->
  <rect x="195" y="138" width="130" height="1.5" rx="1" fill="#fbbf24" opacity="0.25"/>

  <!-- rtl-skill wordmark -->
  <text
    x="260"
    y="162"
    font-family="'SF Mono', 'Fira Code', 'Consolas', 'Courier New', monospace"
    font-size="15"
    font-weight="500"
    fill="#94a3b8"
    text-anchor="middle"
    letter-spacing="5">rtl-skill</text>
</svg>
